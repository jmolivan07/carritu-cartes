<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  min-height:100vh;
  background-image:url("fons.jpg");
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:88%;
  max-width:420px;
  text-align:center;
  padding:28px 18px;
}

.logo{
  max-width:280px;
  width:85%;
  margin-bottom:32px;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,0.25));
}

.boto{
  display:block;
  color:white;
  text-decoration:none;
  padding:18px;
  margin:14px 0;
  border-radius:18px;
  font-size:21px;
  font-weight:bold;
  box-shadow:0 5px 12px rgba(0,0,0,0.25);
}

.cat{ background:rgba(242,201,76,0.92); color:#3b2b00; }
.esp{ background:rgba(242,153,74,0.92); }
.ang{ background:rgba(235,87,87,0.92); }
.fr{ background:rgba(39,174,96,0.92); }
.ale{ background:rgba(47,128,237,0.92); }

.boto:hover{
  transform:scale(1.02);
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" alt="Logo" class="logo">

<a class="boto cat" href="2026-LLANCA-CAT.pdf">Català</a>
<a class="boto esp" href="2026-LLANCA-ESP.pdf">Castellano</a>
<a class="boto ang" href="2026-LLANCA-ANG.pdf">English</a>
<a class="boto fr" href="2026-LLANCA-FR.pdf">Français</a>
<a class="boto ale" href="2026-LLANCA-ALE.pdf">Deutsch</a>

</div>

</body>
</html>
